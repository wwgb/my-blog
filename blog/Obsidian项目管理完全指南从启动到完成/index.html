    <p>用 Obsidian 做项目管理，最大的好处是：
所有资料、思考、文档、任务都在同一个地方。</p>
<p>一个标准的项目文件夹应该包含：</p>
<ul>
<li>项目说明</li>
<li>任务清单</li>
<li>参考资料</li>
<li>输出成果</li>
<li>每日记录</li>
<li>最终复盘</li>
</ul>
<p>不需要插件，不需要数据库，不需要学习成本。</p>
<p>你只需要一个稳定的结构，就能把任何项目管理得清清楚楚。</p>
<p>项目结束后，一键归档，不会占用你的主界面。</p>
