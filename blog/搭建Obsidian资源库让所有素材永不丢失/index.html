    <p>Resources 资源库 = 你的第二大脑。</p>
<p>你可以在这里存放：</p>
<ul>
<li>好文章</li>
<li>好句子</li>
<li>截图</li>
<li>模板</li>
<li>素材</li>
<li>教程</li>
<li>工具清单</li>
<li>学习笔记</li>
</ul>
<p>它的核心原则：只存“有用”、“会复用”、“有价值”的内容。</p>
<p>结构越简单，越能长期使用。</p>
<p>一个好的资源库，会让你越来越值钱。</p>
