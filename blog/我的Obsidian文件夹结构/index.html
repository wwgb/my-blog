    <h1>我的 Obsidian 文件夹结构</h1>
<h2>顶层文件夹</h2>
<p>📁 _inbox/ # 快速捕获，未处理
📁 projects/ # 项目笔记
📁 areas/ # 长期关注的领域
📁 resources/ # 参考资料
📁 archive/ # 归档</p>
<h2>为什么这样设计</h2>
<ul>
<li><code>_inbox</code> 保证零门槛记录</li>
<li><code>projects</code> 有始有终</li>
<li><code>areas</code> 持续更新</li>
<li><code>resources</code> 只读不写</li>
<li><code>archive</code> 让主文件夹保持清爽</li>
</ul>
