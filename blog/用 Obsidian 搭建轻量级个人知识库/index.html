    <p>本文介绍如何从零搭建一个简洁、不折腾的个人知识库，只使用核心文件夹结构 + 索引文件，不依赖复杂插件。</p>
<h3>核心结构</h3>
<ul>
<li>00_Inbox：临时收集</li>
<li>01_Notes：日常笔记</li>
<li>02_Projects：项目文档</li>
<li>03_Resources：素材与资料</li>
</ul>
<h3>使用技巧</h3>
<ol>
<li>每天只整理一次 Inbox</li>
<li>用 MOC 索引串联主题</li>
<li>关闭不必要的插件以保持流畅</li>
</ol>
<p>适合追求极简、不想被工具绑架的用户。</p>
