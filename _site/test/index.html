<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      padding: 20px;
    }

    /* 你的网站容器 */
    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    /* 卡片网格 */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* 卡片 —— 完全和你现在一样 */
    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 24px;
      width: 100%;
      box-sizing: border-box;
    }

    .card-banner {
      width: 100%;
      height: 160px;
      overflow: hidden;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .card-banner img {
      width: 100%;
      height: 100%;
      object-fit: banner;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .card-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>测试卡片（手机上绝不会溢出）</h1>
    <br>

    <div class="card-grid">
      <div class="card">
        <div class="card-banner">
          <img src="https://picsum.photos/600/400" alt="">
        </div>
        <h3>测试标题</h3>
      </div>

      <div class="card">
        <div class="card-banner">
          <img src="https://picsum.photos/600/400" alt="">
        </div>
        <h3>测试标题</h3>
      </div>

      <div class="card">
        <div class="card-banner">
          <img src="https://picsum.photos/600/400" alt="">
        </div>
        <h3>测试标题</h3>
      </div>
    </div>
  </div>
</body>
</html>
