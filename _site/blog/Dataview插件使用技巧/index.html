    <h1>Dataview 插件使用技巧</h1>
<h2>查询所有未完成任务</h2>
<pre><code class="language-dataview">TASK FROM &quot;日记&quot;
WHERE !completed
</code></pre>
<h2>按标签统计笔记数</h2>
<pre><code class="language-dataview">TABLE length(rows) AS 数量
FROM #笔记
GROUP BY file.tags
</code></pre>
