  <main>
    <p>Inbox 是整个 Obsidian 笔记系统的入口，也是最重要的一环。</p>
<p>如果你没有 Inbox，你会遇到这些问题：</p>
<ul>
<li>灵感不知道记在哪里</li>
<li>临时文件散落在各个文件夹</li>
<li>笔记越来越乱，无法整理</li>
<li>想找东西找不到</li>
</ul>
<p>一个健康的 Inbox 工作流只有三步：</p>
<ol>
<li>收集：所有东西先丢进 Inbox</li>
<li>处理：每天固定时间清空</li>
<li>归类：分发到正确的位置</li>
</ol>
<p>只要坚持这套流程，你的笔记库永远干净、有序、不爆炸。</p>
<p>Inbox 不是用来存放东西的，它是一个“处理站”。</p>
