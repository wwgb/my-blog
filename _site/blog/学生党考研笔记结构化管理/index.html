    <p>针对考研、考证等长期复习场景，设计一套可检索、可背诵、可复盘的笔记体系。</p>
<h3>文件夹规划</h3>
<ul>
<li>专业课：按章节拆分</li>
<li>公共课：政治 / 英语分库</li>
<li>错题本：统一存放错误思路</li>
<li>背诵卡片：用于考前突击</li>
</ul>
<h3>实操流程</h3>
<ul>
<li>第一轮：通读 + 框架搭建</li>
<li>第二轮：重点标注 + 例题关联</li>
<li>第三轮：只看卡片快速复盘</li>
</ul>
<p>这套结构能显著减少复习混乱，提高记忆效率。</p>
