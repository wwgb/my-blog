<h3>核心模块</h3>
<ul>
<li>项目总览：进度、负责人、截止时间</li>
<li>会议记录：每次会议要点与待办</li>
<li>每日简报：简短当日工作内容</li>
<li>复盘总结：每周一次迭代优化</li>
</ul>
<h3>搭配插件</h3>

<li>Tasks 管理待办</li>
<li>Dataview 自动生成项目进度</li>
<li>Excalidraw 绘制简单流程图</li>
</ul>
